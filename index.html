<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>30-Day Fit Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --green-dark: #085041;
  --amber: #EF9F27;
  --amber-light: #FAEEDA;
  --purple: #7F77DD;
  --purple-light: #EEEDFE;
  --purple-dark: #3C3489;
  --bg: #F5F3EE;
  --card: #FFFFFF;
  --text: #1a1a18;
  --text-muted: #6b6b66;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.14);
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── TOP HERO ── */
.hero {
  background: var(--text);
  color: #fff;
  padding: 2.5rem 1.5rem 3rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 80% at 70% 20%, rgba(29,158,117,0.3) 0%, transparent 70%),
              radial-gradient(ellipse 50% 60% at 20% 80%, rgba(127,119,221,0.25) 0%, transparent 70%);
}
.hero-tag {
  display: inline-block;
  background: rgba(29,158,117,0.25);
  color: #5DCAA5;
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 99px;
  margin-bottom: 1rem;
  position: relative;
}
.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(32px, 6vw, 52px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.02em;
  position: relative;
  margin-bottom: 0.5rem;
}
.hero h1 span { color: #5DCAA5; }
.hero-sub {
  font-size: 15px;
  color: rgba(255,255,255,0.55);
  position: relative;
  margin-bottom: 2rem;
}

/* day nav in hero */
.day-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  position: relative;
  margin-bottom: 1.5rem;
}
.day-nav-btn {
  background: rgba(255,255,255,0.1);
  border: 0.5px solid rgba(255,255,255,0.2);
  color: #fff;
  border-radius: 99px;
  width: 36px; height: 36px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.day-nav-btn:hover { background: rgba(255,255,255,0.18); }
.day-center { text-align: center; }
.day-num {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}
.day-focus {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-top: 3px;
}

/* progress pills */
.day-pills {
  display: flex;
  justify-content: center;
  gap: 4px;
  flex-wrap: wrap;
  max-width: 420px;
  margin: 0 auto;
  position: relative;
}
.pill {
  width: 10px; height: 10px;
  border-radius: 99px;
  background: rgba(255,255,255,0.15);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.pill.done { background: var(--green); }
.pill.active { background: #fff; transform: scale(1.3); }
.pill:hover { opacity: 0.8; }

/* ── MAIN CONTENT ── */
.main {
  max-width: 720px;
  margin: 0 auto;
  padding: 1.5rem 1rem 4rem;
}

/* stats row */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}
.stat {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 12px;
  text-align: center;
}
.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* progress bar */
.progress-wrap {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
.bar-bg {
  flex: 1; height: 8px;
  background: #eee;
  border-radius: 99px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--green), #5DCAA5);
  transition: width 0.4s ease;
}
.progress-pct {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
  min-width: 38px;
  text-align: right;
}

/* sections */
.section {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 1rem;
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border-bottom: 0.5px solid var(--border);
}
.s-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.s-icon.ex  { background: var(--green-light); }
.s-icon.diet { background: var(--amber-light); }
.s-icon.life { background: var(--purple-light); }
.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.section-sub { font-size: 12px; color: var(--text-muted); }
.s-count {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-muted);
  background: var(--bg);
  border-radius: 99px;
  padding: 3px 10px;
  font-weight: 500;
}

/* tasks */
.task {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 13px 18px;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.task:last-child { border-bottom: none; }
.task:hover { background: #fafaf8; }
.task.done .task-name { color: #aaa; text-decoration: line-through; }
.task.done .task-detail { color: #ccc; }

.cb {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 1.5px solid #ccc;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  background: #fff;
}
.cb.on { border-color: var(--green); background: var(--green); }
.cb svg { display: none; }
.cb.on svg { display: block; }

.task-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.35; }
.task-detail { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* rest day special */
.rest-banner {
  background: linear-gradient(135deg, #EEEDFE, #E1F5EE);
  border-radius: var(--radius-sm);
  padding: 20px;
  text-align: center;
  margin: 12px 16px 16px;
}
.rest-banner .rb-icon { font-size: 36px; margin-bottom: 8px; }
.rest-banner h3 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--purple-dark); margin-bottom: 4px; }
.rest-banner p { font-size: 13px; color: var(--text-muted); }

/* ── DARK MODE ── */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110;
    --card: #1c1c1a;
    --text: #f0ede6;
    --text-muted: #888880;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
  }
  .task:hover { background: #222220; }
  .cb { background: #111; border-color: #444; }
  .bar-bg { background: #2a2a28; }
  .stat-num { color: var(--text); }
}

@media (max-width: 480px) {
  .hero { padding: 2rem 1rem 2.5rem; }
  .stats { grid-template-columns: repeat(3, 1fr); }
  .stat-num { font-size: 20px; }
}
</style>

// ─── STATE ───
function getStartDate() {
  let s = localStorage.getItem('fit_start');
  if (!s) { s = new Date().toISOString().split('T')[0]; localStorage.setItem('fit_start', s); }
  return s;
}

function todayIndex() {
  const start = new Date(getStartDate());
  const now = new Date();
  const diff = Math.floor((now - start) / 86400000);
  return Math.min(Math.max(diff, 0), 29);
}

let currentDay = todayIndex();
let checks = JSON.parse(localStorage.getItem('fit_checks') || '{}');

function save() { localStorage.setItem('fit_checks', JSON.stringify(checks)); }

function key(d, cat, i) { return `d${d}_${cat}_${i}`; }

function buildList(containerId, countId, items, cat, color) {
  const ul = document.getElementById(containerId);
  ul.innerHTML = '';
  let done = 0;
  items.forEach((item, i) => {
    const k = key(currentDay, cat, i);
    const checked = !!checks[k];
    if (checked) done++;
    const row = document.createElement('div');
    row.className = 'task' + (checked ? ' done' : '');
    row.innerHTML = `
      <div class="cb ${checked ? 'on' : ''}">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
          <polyline points="1,4.5 4.5,8 10,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="task-name">${item.n}</div>
        <div class="task-detail">${item.d}</div>
      </div>`;
    row.onclick = () => {
      checks[k] = !checks[k];
      save();
      render();
    };
    ul.appendChild(row);
  });
  document.getElementById(countId).textContent = `${done}/${items.length}`;
  return done;
}

function render() {
  const w = workouts[currentDay];
  document.getElementById('day-num').textContent = `Day ${currentDay + 1}`;
  document.getElementById('day-focus').textContent = w.focus;

  // pills
  const pillsEl = document.getElementById('day-pills');
  pillsEl.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    const dayDone = isDayComplete(i);
    p.className = 'pill' + (dayDone ? ' done' : '') + (i === currentDay ? ' active' : '');
    p.title = `Day ${i + 1}`;
    p.onclick = (e) => { e.stopPropagation(); currentDay = i; render(); };
    pillsEl.appendChild(p);
  }

  // exercise section
  const exList = document.getElementById('ex-list');
  if (w.rest) {
    exList.innerHTML = `<div class="rest-banner"><div class="rb-icon">🧘</div><h3>Rest & Recover</h3><p>Light movement only. Your muscles grow during rest.</p></div>`;
    document.getElementById('ex-count').textContent = '';
    document.getElementById('ex-sub').textContent = w.focus;
    // still render rest tasks
    const exEl2 = document.createElement('div');
    let exDone2 = 0;
    w.ex.forEach((item, i) => {
      const k = key(currentDay, 'ex', i);
      const checked = !!checks[k];
      if (checked) exDone2++;
      const row = document.createElement('div');
      row.className = 'task' + (checked ? ' done' : '');
      row.innerHTML = `<div class="cb ${checked?'on':''}"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><polyline points="1,4.5 4.5,8 10,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div class="task-name">${item.n}</div><div class="task-detail">${item.d}</div></div>`;
      row.onclick = () => { checks[key(currentDay,'ex',i)]=!checks[key(currentDay,'ex',i)]; save(); render(); };
      exList.appendChild(row);
    });
    document.getElementById('ex-count').textContent = `${exDone2}/${w.ex.length}`;
  } else {
    document.getElementById('ex-sub').textContent = w.focus;
    buildList('ex-list', 'ex-count', w.ex, 'ex');
  }

  const dietDone = buildList('diet-list', 'diet-count', dietTasks, 'diet');
  const lifeDone = buildList('life-list', 'life-count', lifeTasks, 'life');

  // recalc ex done for stats
  let exDone = 0;
  w.ex.forEach((_, i) => { if (checks[key(currentDay,'ex',i)]) exDone++; });
  const total = w.ex.length + dietTasks.length + lifeTasks.length;
  const done = exDone + dietDone + lifeDone;
  const pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById('s-done').textContent = done;
  document.getElementById('s-total').textContent = total;
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';

  // streak
  let streak = 0;
  for (let i = currentDay; i >= 0; i--) {
    if (isDayComplete(i)) streak++;
    else break;
  }
  document.getElementById('s-streak').textContent = streak;
}

function isDayComplete(d) {
  const w = workouts[d];
  const all = [...w.ex.map((_,i)=>key(d,'ex',i)), ...dietTasks.map((_,i)=>key(d,'diet',i)), ...lifeTasks.map((_,i)=>key(d,'life',i))];
  return all.length > 0 && all.every(k => checks[k]);
}

function changeDay(dir) {
  currentDay = Math.max(0, Math.min(29, currentDay + dir));
  render();
}

render();
</script>
</body>
</html>
